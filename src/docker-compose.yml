services:
  postgres:
    image: postgres:16-alpine
    container_name: suisse-bid-match-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suisse_bid_match}
      POSTGRES_USER: ${POSTGRES_USER:-suisse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suisse}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suisse} -d ${POSTGRES_DB:-suisse_bid_match}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: suisse-bid-match-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suisse-bid-match-api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-Suisse Bid Match}
      APP_ENV: ${APP_ENV:-dev}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_REQUIRE_POSTGRES: ${DB_REQUIRE_POSTGRES:-true}
      DB_URL: ${DB_URL:-postgresql+psycopg://suisse:suisse@postgres:5432/suisse_bid_match}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tender_chunks}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-30}
      QDRANT_RECREATE_COLLECTION: ${QDRANT_RECREATE_COLLECTION:-false}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      SIMAP_BASE_URL: ${SIMAP_BASE_URL:-https://int.simap.ch}
      SIMAP_TOKEN: ${SIMAP_TOKEN:-}
      SIMAP_TIMEOUT_SECONDS: ${SIMAP_TIMEOUT_SECONDS:-20}
      SIMAP_RPS: ${SIMAP_RPS:-1.0}
      SIMAP_PUBLICATIONS_PATH: ${SIMAP_PUBLICATIONS_PATH:-/api/publications/v2/project/project-search}
      SIMAP_PUBLICATION_DETAIL_PATH: /api/publications/v1/project/{projectId}/publication-details/{publicationId}
      DOCS_STORAGE_ROOT: ${DOCS_STORAGE_ROOT:-./data/docs}
      DENSE_WEIGHT: ${DENSE_WEIGHT:-0.7}
      BM25_WEIGHT: ${BM25_WEIGHT:-0.3}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-8}
      DENSE_CANDIDATES: ${DENSE_CANDIDATES:-30}
      ENABLE_DEBUG_CHAT: ${ENABLE_DEBUG_CHAT:-true}
    volumes:
      - ./:/app
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["sh", "-c", "alembic upgrade head && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --reload"]
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suisse-bid-match-ui
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    command:
      [
        "streamlit",
        "run",
        "apps/ui/streamlit_app.py",
        "--server.port",
        "8501",
        "--server.address",
        "0.0.0.0"
      ]
    restart: unless-stopped
